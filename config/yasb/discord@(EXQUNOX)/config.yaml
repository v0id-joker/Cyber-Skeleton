# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

# Generated by YASB GUI v0.0.6
# Last edited: Apr 12, 2026 22:31
# https://github.com/amnweb/yasb-gui
watch_stylesheet: true
watch_config: true
debug: false
update_check: true # Enable automatic update check.
glazewm:
  start_command: "glazewm.exe start"
  stop_command: "glazewm.exe command wm-exit"
  reload_command: "glazewm.exe command wm-exit && glazewm.exe start"
komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"

bars:
  primary-bar:
    enabled: true
    screens: ['*']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: true
      round_corners: true
      border_color: None
    window_flags:
      always_on_top: false
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: "100%"
      height: 32
    padding:
      top: 3
      left: 6
      bottom: 2
      right: 6
    widgets:
      left: ["power_menu", "glazewm_workspaces", "active_window"]
      center: ["clock"]
      right: ["media", "wallpapers", "wifi", "volume", "notifications"]

widgets:
  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      callbacks:
        on_left: "exec quick_settings"
        on_middle: "do_nothing"
        on_right: "exec cmd.exe /c start ms-settings:network"
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      # Offline behavior (matching komorebi's label_offline and hide_if_offline)
      offline_label: "Hey Buddy, GlazeWM is Offline"
      hide_if_offline: false
      
      # Workspace display labels (matching komorebi's label_workspace_btn and label_workspace_active_btn)
      populated_label: "\udb85\udcfc"
      empty_label: "\udb85\udcfc"
      active_populated_label: "\udb85\udcfb"
      active_empty_label: "\udb85\udcfb"
      
      # Workspace management (matching komorebi's hide_empty_workspaces)
      hide_empty_workspaces: false
      
      # Server connection
      glazewm_server_uri: "ws://localhost:6123"
      
      # Additional GlazeWM-specific options (keeping defaults)
      enable_scroll_switching: true
      reverse_scroll_direction: true

  glazewm_tiling_direction:
    type: "glazewm.tiling_direction.GlazewmTilingDirectionWidget"
    options:
      horizontal_label: "\ueb56"
      vertical_label: "\ueb57"
      btn_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]

  komorebi_workspaces:
      type: "komorebi.workspaces.WorkspaceWidget"
      options:
        label_offline: "Komorebi Offline"
        label_workspace_btn: "\uf4c3"
        label_default_name: "{index}"
        label_zero_index: false
        hide_empty_workspaces: false
        # callbacks:
        #   on_left: "activate"
        #   on_middle: "rename_temporary"
        #   on_right: "rename_permanent"

  komorebi_active_layout:
      type: "komorebi.active_layout.ActiveLayoutWidget"
      options:
        hide_if_offline: false
        label: "{icon}"
        layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack']
        layout_icons:
          bsp: "[\\\\]"
          columns: "[||]"
          rows: "[==]"
          grid: "[G]"
          vertical_stack: "[V]="
          horizontal_stack: "[H]="
          ultrawide_vertical_stack: "||="
          monocle: "[M]"
          maximised: "[X]"
          floating: "><>"
          paused: "[P]"
        callbacks:
          on_left: "next_layout"
          on_middle: "toggle_monocle"
          on_right: "prev_layout"
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title}"
      label_alt: "{artist}"
      max_field_size:
        label: 60
        label_alt: 60
      show_thumbnail: true
      controls_hide: false
      hide_empty: true
      thumbnail_alpha: 80
      thumbnail_padding: 8
      thumbnail_corner_radius: 6
      icons:
        prev_track: "\uE892"
        next_track: "\uE893"
        play: "\uE768"
        pause: "\uE769"
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      label_icon: true
      label_icon_size: 15
      max_length: 63
      max_length_ellipsis: "..."
      monitor_exclusive: true
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>"
      volume_icons:
        - "\uEEE8"    # Icon for muted
        - "\uF026"    # Icon for 0-10% volume
        - "\uF027"    # Icon for 11-30% volume
        - "\uF027"    # Icon for 31-60% volume
        - "\uF028"    # Icon for 61-100% volume
      callbacks:
        on_middle: "exec cmd.exe /c start ms-settings:sound"
        on_right: "exec quick_settings"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%b %d | %H:%M}"
      label_alt: "{%A, %B %d %Y | %H:%M:%S}"
      timezones: []
      callbacks:
        on_left: "toggle_label"
  #disk:
   # type: "yasb.disk.DiskWidget"
    #options:
     #   label: "<span>\uf0c7</span>"
      #  label_alt: "<span>\uf0c7</span>"
       # update_interval: 60
        #group_label:
         # volume_labels: ["C", "D", "E", "F"]
          #show_label_name: false
          #blur: True
          #round_corners: True
          #round_corners_type: "small"
          #border_color: "System"
          #alignment: "right"
          #direction: "down"
          #distance: 6
        #callbacks:
         # on_left: "toggle_group"
         # on_middle: "toggle_label"
          #on_right: "exec explorer C:\\" # Open disk C in file explorer
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\uDB83\uDE09</span>"
      image_path: "D:\\wallpaper\\pictures"
      change_automatically: false
      update_interval: 60
      gallery:
        enabled: true
        blur: true
        image_width: 296
        image_per_page: 6
        show_buttons: true
        orientation: "portrait"
        image_spacing: 10
        lazy_load: true
        lazy_load_delay: 10
        lazy_load_fadein: 200
        image_corner_radius: 20
        enable_cache: true
  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uF476</span>"
      label_alt: "{count} notifications"
      hide_empty: false
      tooltip: false
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_label"
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      show_unpinned: true
      show_unpinned_button: false
      show_battery: false
      show_volume: false
      show_network: false
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "\uF011"
      uptime: true
      blur: false
      blur_background: true
      animation_duration: 200
      button_row: 5
      buttons:
        shutdown: ["\uF011", "Rage Quit"]
        restart: ["\uEAD2", "Oops, Reboot"]
        signout: ["\uDB80\uDF43", "Dip Out"]
        hibernate: ["\uF28E", "Bear Mode"]
        sleep: ["\u23FE", "Nap Time"]
        cancel: ["", "Nah, Im Good "]
