# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

# Generated by YASB GUI v0.0.6
# Last edited: Apr 12, 2026 23:32
# https://github.com/amnweb/yasb-gui

watch_stylesheet: true
watch_config: true
debug: false
update_check: true # Enable automatic update check.
glazewm:
  start_command: "glazewm.exe start"
  stop_command: "glazewm.exe command wm-exit"
  reload_command: "glazewm.exe command wm-exit && glazewm.exe start"
komorebi:
  start_command: "komorebic start --whkd && komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"

bars:
  status-bar:
    enabled: true
    screens: ['*']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      acrylic: true
      dark_mode: false
      round_corners: True
      border_color: None
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 32
    padding:
      top: 3
      left: 6
      bottom: 2
      right: 6
    widgets:
      left: ["power_menu", "komorebi_workspaces","komorebi_active_layout", "active_window"]
      center: ["clock"]
      right: ["media_player", "weather", "wifi", "volume", "battery", "notification_button"]

widgets: 

  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      max_length: 30
      label_icon: true
      label_icon_size: 16
      max_length_ellipsis: ".."
      monitor_exclusive: false

  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "<span>{icon}</span>{percent}%"
      label_alt: "<span>{icon}</span> {percent}% | time: {time_remaining}"
      charging_options:
        icon_format: "{charging_icon}"
        blink_charging_icon: true
        blink_interval: 500
      status_thresholds:
            critical: 15
            low: 25
            medium: 50
            high: 75
            full: 100
      status_icons:
        icon_charging: "\uF1E6"
        icon_critical: "\uE851"
        icon_low: "\uE852"
        icon_medium: "\uE855"
        icon_high: "\uE858"
        icon_full: "\uE83F"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%b %d | %I:%M %p}"
      label_alt: "{%A %d %B %Y | %I:%M %p}"
        #timezones: ["Europe/London", "America/New_York"]
      timezones: []
      callbacks:
        on_left: "toggle_label"
        on_middle: "exec explorer.exe shell:Appsfolder\\Microsoft.WindowsAlarms_8wekyb3d8bbwe!App"
        on_right: "next_timezone"

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span>\uF4BC</span> {info[percent][total]}%"
      label_alt: "<span>\uF437</span> {info[histograms][cpu_percent]}"
      update_interval: 500
      histogram_icons:
        - "\u2581"   # 0%
        - "\u2581"   # 10%
        - "\u2582"   # 20%
        - "\u2583"   # 30%
        - "\u2584"   # 40%
        - "\u2585"   # 50%
        - "\u2586"   # 60%
        - "\u2587"   # 70%
        - "\u2588"   # 80%+
      histogram_num_columns: 10
      callbacks:
        on_right: "exec cmd /c Taskmgr"

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "<span>\uF200</span> {virtual_mem_free}"
      label_alt: "<span>\uF4BC</span> {virtual_mem_percent}%"
      update_interval: 5000
      callbacks:
        on_right: "exec cmd /c Taskmgr"

  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      # Offline behavior (matching komorebi's label_offline and hide_if_offline)
      offline_label: "GlazeWM is Offline"
      hide_if_offline: false
      
      # Workspace display labels (matching komorebi's label_workspace_btn and label_workspace_active_btn)
      populated_label: "\udb85\udcfc"
      empty_label: "\udb85\udcfc"
      active_populated_label: "\udb85\udcfb"
      active_empty_label: "\udb85\udcfb"
      
      # Workspace management (matching komorebi's hide_empty_workspaces)
      hide_empty_workspaces: false
      
      # Server connection
      glazewm_server_uri: "ws://localhost:6123"
      
      # Additional GlazeWM-specific options (keeping defaults)
      enable_scroll_switching: true
      reverse_scroll_direction: true

  glazewm_tiling_direction:
    type: "glazewm.tiling_direction.GlazewmTilingDirectionWidget"
    options:
      horizontal_label: "\ueb56"
      vertical_label: "\ueb57"
      btn_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]

  komorebi_workspaces:
      type: "komorebi.workspaces.WorkspaceWidget"
      options:
        label_offline: "Komorebi Offline"
        label_workspace_btn: "\uf4c3"
        label_default_name: "{index}"
        label_zero_index: false
        hide_empty_workspaces: false
        # callbacks:
        #   on_left: "activate"
        #   on_middle: "rename_temporary"
        #   on_right: "rename_permanent"

  komorebi_active_layout:
      type: "komorebi.active_layout.ActiveLayoutWidget"
      options:
        hide_if_offline: true
        label: "{icon}"
        layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack','right_main_vertical_stack']
        layout_icons:
          bsp: "\uebeb"
          columns: "\uebf7"
          rows: "\uec01"
          grid: "\udb81\udf58"
          scrolling: "\uebf7"
          vertical_stack: "\uebee"
          horizontal_stack: "\uebf0"
          ultrawide_vertical_stack: "\uebee"
          right_main_vertical_stack: "\uebf1"
          monocle: "\uf06f"
          maximized: "\uf06f"
          floating: "\uf2d2"
          paused: "\udb83\udf89"
          tiling: "\udb81\ude40"
        callbacks:
          on_left: 'next_layout'
          on_middle: 'toggle_monocle'
          on_right: 'prev_layout'
        container_padding: 
          top: 0
          left: 0
          bottom: 0
          right: 0


  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "<span>{wifi_icon}</span> {wifi_name}"
      update_interval: 5000
      wifi_icons:
        - "\uDB82\uDD2E"   # 0% strength (no wifi)
        - "\uDB82\uDD1F"   # 1-25% strength
        - "\uDB82\uDD22"   # 26-50% strength
        - "\uDB82\uDD25"   # 51-75% strength
        - "\uDB82\uDD28"   # 76-100% strength. Alternate theming: \uf1eb
      callbacks:
        on_left: "exec quick_settings"
        on_middle: "do_nothing"
        on_right: "exec cmd.exe /c start ms-settings:network"

  disk:
    type: "yasb.disk.DiskWidget"
    options:
      label: "<span>\uDB80\uDECA</span>{volume_label} {space[used][percent]}"
      label_alt: "<span>\uDB80\uDECA</span>{volume_label} {space[used][gb]} / {space[total][gb]}"
      volume_label: "C"
      update_interval: 60     # Update interval in seconds
      callbacks:
        on_middle: "do_nothing"
        on_right: "exec explorer C:\\"     # Open disk C in file explorer

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "{volume}"
      volume_icons:
        - "\uEEE8" #muted
        - "\uF026" #0-10%
        - "\uF027" #10-30%
        - "\uF027" #30-60%
        - "\uF028" #60-100%
      callbacks:
          # on_left: "exec quick_settings"
        on_middle: "do_nothing"
        on_right: "exec cmd.exe /c start ms-settings:sound"

  media_player:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title} - {artist}"
      label_alt: "{title}"
      max_field_size:
        label: 20
        label_alt: 30
      show_thumbnail: true
      controls_only: false
      controls_left: true
      hide_empty: true
      thumbnail_alpha: 80
      thumbnail_padding: 8
      thumbnail_corner_radius: 7     # Set to 0 for square corners
      icons:
        prev_track: "\uE622"
        next_track: "\uE623"
        play: "\uF5B0"
        pause: "\uE62E"

  traffic:
    type: "yasb.traffic.TrafficWidget"
    options:
        # can be: download_speed, download_justified, download_category, and same for upload
      label: "\uEB01 \uEAB4 {download_justified} | \uEAB7 {upload_justified}"
      label_alt: "\uEB01 \uEAB4 {download_category} | \uEAB7 {upload_category}"
      update_interval: 1000   # Update interval should be a multiple of 1000
      callbacks:
        on_right: "exec cmd /c Taskmgr"

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "<span>\uf011</span>"
      blur_background: true
      animation_duration: 200   # Milisecond 
      button_row: 3   # Number of buttons in row, min 1 max 5
      buttons:
        lock: ["\uE72E", "Lock"]
          # signout: ["\udb80\udf43","Sign out"]
        sleep: ["\uF1DB", "Sleep"]
        shutdown: ["\uE7E8", "Shut Down"]
        restart: ["\uE777", "Restart"]
        hibernate: ["\uE823", "Hibernate"]
        cancel: ["\uE711", "Cancel"]
          #force_shutdown: ["\uf011","Force Shut Down"]
          #force_restart: ["\uead2","Force Restart"]

  weather:
    type: "yasb.weather.WeatherWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "Conditions: {conditions}, Min: {min_temp}, Max: {max_temp}, Precip: {precip}"
      api_key: '3bf4cf9a7c3f40d6b31174128242807'
      update_interval: 600   #Update interval in seconds, Min 600
      hide_decimal: true
      location: 'Howrah IN'   # You can use "USA Los Angeles 90006" {COUNTRY CITY ZIP_CODE}, or just city.
      callbacks:
        on_left: "toggle_label"
      icons:
        sunnyDay: "\uE30D"
        clearNight: "\uE32B"
        cloudyDay: "\uDB81\uDD99"
        cloudyNight: "\uE311"
        rainyDay: "\uDB81\uDE7E"
        rainyNight: "\uDB81\uDE7E"
        snowyDay: "\uDB81\uDD98"
        snowyNight: "\uDB81\uDD98"
        blizzardDay: "\uEBAA"
        default: "\uEBAA"
          # https://www.weatherapi.com/docs/
          # Usage {temp}, {min_temp}, {max_temp}, {temp_f}, {min_temp_f}, {max_temp_f}, {location}, {humidity}, {icon}, {conditions}

  # Some custom widgets
  explorer_button:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\uF07C"
      label_alt: "Explorer"
      class_name: "explorer-widget"
      exec_options:
        run_once: true
      callbacks:
        on_left: "exec explorer.exe"
        on_right: "toggle_label"

  ip_info:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\uF3C5 {data[city]}, {data[region]}"
      label_alt: "\uF3C5 {data[ip]} [{data[country]}]"
      class_name: "ip-info-widget"
      exec_options:
        run_cmd: "curl.exe https://ipinfo.io"
        run_interval: 120000                                          # every 5 minutes
        return_format: "json"
      callbacks:
        on_left: "toggle_label"
        on_middle: "exec cmd /c ncpa.cpl"                             # open network settings
        on_right: "exec cmd /c start https://ipinfo.io/{data[ip]} "   # open ipinfo in browser

  lang:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\uDB80\uDF0C {data}"
      label_alt: "\uDB81\uDFD3 {data}"
      class_name: "lang-widget"
      exec_options:
        run_cmd: "powershell add-type -assemblyname system.windows.forms;([system.windows.forms.inputlanguage]::currentinputlanguage).Culture.Name"
          # run every 3 sec
        run_interval: 3000
        return_format: "string"

  notification_button:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uF0F3</span>"
      label_alt: "<span>\uF49A</span>"
      class_name: "notification-widget"
      callbacks:
        on_left: "exec notification_center"
        on_right: "toggle_label"

  search_button:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uF422</span>"
      label_alt: "<span>\uF422</span> Search"
      class_name: "search-widget"
      exec_options:
        run_once: true
      callbacks:
        on_left: "exec search"
        on_right: "toggle_label"
