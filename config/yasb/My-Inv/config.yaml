watch_stylesheet: true
watch_config: true
debug: false
update_check: true
komorebi:
  start_command: "komorebic start --whkd && komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"

glazewm:
  start_command: "glazewm.exe start"
  stop_command: "glazewm.exe command wm-exit"
  reload_command: "glazewm.exe command wm-exit && glazewm.exe start"
bars:
  status-bar:
    enabled: true
    screens: ['*']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: true
      round_corners: true
      border_color: None #"#c784f6" 
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: "100%"
      height: 31
    padding:
      top: 3
      left: 6
      bottom: 2
      right: 6
    widgets:
      left: ["power_menu", "komorebi_workspaces","komorebi_active_layout","explorer_button", "zen_launcher", "Music_launchers"]
      center: ["clock"]
      right: ["weather", "media_player", "wallpapers", "wifi", "volume", "battery", "notification_button"]
widgets:
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      max_length: 56
      label_icon: true
      label_icon_size: 16
      max_length_ellipsis: ".."
      monitor_exclusive: false

  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "<span>{icon}</span>  {percent}%"
      label_alt: "<span>{icon}</span> {percent}% | time: {time_remaining}"
      charging_options:
        icon_format: "{charging_icon}"
        blink_charging_icon: true
        blink_interval: 500
      status_thresholds:
        critical: 12
        low: 25
        medium: 50
        high: 75
        full: 100
      status_icons:
        icon_charging: "\uF1E6"
        icon_critical: "\uF244"
        icon_low: "\uF243"
        icon_medium: "\uF242"
        icon_high: "\uF241"
        icon_full: "\uF240"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%b %d | %I:%M %p}"
      label_alt: "{%A %d %B %Y | %I:%M %p}"
      timezones: []
      callbacks:
        on_left: "toggle_label"
        on_middle: "exec explorer.exe shell:Appsfolder\\Microsoft.WindowsAlarms_8wekyb3d8bbwe!App"
        on_right: "next_timezone"

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span>\uF4BC</span> {info[percent][total]}%"
      label_alt: "<span>\uF437</span> {info[histograms][cpu_percent]}"
      update_interval: 500
      histogram_icons:
        - "\u2581"
        - "\u2581"
        - "\u2582"
