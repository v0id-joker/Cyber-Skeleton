      duration: 1000
    blur_effect:
      enabled: true
      acrylic: true
      dark_mode: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "#8dbcff"
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 26
    padding:
      top: 3
      left: 3
      bottom: 0
      right: 3
    widgets:
      left: ["power_menu", "glazewm_workspaces", "glazewm_tiling_direction", "active_window"]
      center: ["clock"]
      right: ["weather","media_player" , "wallpapers", "wifi", "volume", "battery", "notification_button"]
